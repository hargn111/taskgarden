name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run test suite
        run: python -m pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != ''
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package release bundle
        run: |
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -czf taskgarden-release.tgz .

      - name: Copy release bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: taskgarden-release.tgz
          target: /tmp/taskgarden-deploy
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            STAGE_DIR="/tmp/taskgarden-src-${{ github.sha }}"
            rm -rf "$STAGE_DIR"
            mkdir -p "$STAGE_DIR"
            tar -xzf /tmp/taskgarden-deploy/taskgarden-release.tgz -C "$STAGE_DIR"
            chmod +x "$STAGE_DIR/scripts/deploy_release.sh"
            TASKGARDEN_RELEASE_ID="${{ github.sha }}" "$STAGE_DIR/scripts/deploy_release.sh" "$STAGE_DIR"
